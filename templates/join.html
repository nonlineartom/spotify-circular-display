<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Pi Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main {
    width: min(420px, 100%);
  }
  .mark {
    width: 72px;
    height: 72px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, #111 0 22%, transparent 23%),
      repeating-radial-gradient(circle, rgba(255,255,255,0.12) 0 1px, transparent 1px 7px),
      linear-gradient(135deg, #1db954, #0f7a3a);
    box-shadow: 0 22px 60px rgba(0,0,0,0.42);
  }
  h1 {
    font-size: 28px;
    line-height: 1.12;
    font-weight: 600;
    text-align: center;
    margin-bottom: 12px;
  }
  p {
    color: rgba(255,255,255,0.68);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
    margin-bottom: 24px;
  }
  a {
    display: block;
    width: 100%;
    border-radius: 999px;
    padding: 15px 18px;
    text-align: center;
    color: #050505;
    background: #1db954;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }
  .note {
    margin-top: 22px;
    color: rgba(255,255,255,0.42);
    font-size: 12px;
  }
</style>
</head>
<body>
  <main>
    <div class="mark"></div>
    <h1>Join Pi Display</h1>
    <p>Connect Spotify to personalize the idle launcher with your playlists. Playback controls on the display still work locally.</p>
    <a href="/login?playlist=1">Connect Spotify</a>
    <p class="note">Guest sessions can be cleared from the display owner’s config.</p>
  </main>
</body>
</html>
