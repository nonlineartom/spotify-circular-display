<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080, user-scalable=no">
<title>Spotify Vinyl Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --size: 1080px;
    --center: 540px;
    --groove-start: 100;
    --groove-end: 530;
    --label-radius: 96px;
    --ring-radius: 90px;
    --spindle-radius: 14px;
    --pill-w: 610px;
    --pill-r: 18px;
  }

  html, body {
    width: var(--size); height: var(--size);
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    cursor: none;
    user-select: none;
  }

  #viewport {
    position: relative;
    width: var(--size); height: var(--size);
    border-radius: 50%;
    overflow: hidden;
    touch-action: none;
    perspective: 1600px;
    perspective-origin: 50% 50%;
  }

  #viewport::before,
  #viewport::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    z-index: 18;
    pointer-events: none;
  }

  #viewport::before {
    top: 0;
    height: 44%;
    background:
      radial-gradient(ellipse at 50% 12%, rgba(0,0,0,0.56) 0%, rgba(0,0,0,0.30) 38%, rgba(0,0,0,0) 76%),
      linear-gradient(to bottom, rgba(0,0,0,0.34), rgba(0,0,0,0));
  }

  #viewport::after {
    bottom: 0;
    height: 35%;
    background:
      radial-gradient(ellipse at 50% 92%, rgba(0,0,0,0.68) 0%, rgba(0,0,0,0.42) 44%, rgba(0,0,0,0) 82%),
      linear-gradient(to top, rgba(0,0,0,0.38), rgba(0,0,0,0));
  }

  /* ── Outer rim depth shadow (static, on top of everything) ── */
  #rim-shadow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 40;
    pointer-events: none;
    /* Multi-layered inset shadow for realistic depth */
    box-shadow:
      /* Outer bevel — dark ring at very edge */
      inset 0 0 0 3px rgba(0,0,0,0.5),
      /* Top highlight — subtle light catch */
      inset 0 4px 8px rgba(255,255,255,0.08),
      /* Bottom shadow — depth underneath */
      inset 0 -6px 16px rgba(0,0,0,0.6),
      /* Soft wide inner vignette */
      inset 0 0 60px rgba(0,0,0,0.4),
      /* Tighter vignette near edge */
      inset 0 0 120px rgba(0,0,0,0.15),
      /* Outer glow/shadow on the desk */
      0 4px 20px rgba(0,0,0,0.8),
      0 0 40px rgba(0,0,0,0.3);
  }

  /* ── Vinyl record (rotates) ── */
  #vinyl {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    will-change: transform;
    transform-style: preserve-3d;
    transform-origin: 50% 50%;
    transition: none;
    -webkit-user-drag: none;
    -webkit-user-select: none;
    user-select: none;
    --flip-sheen: 0;
  }
  #vinyl::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    opacity: var(--flip-sheen);
    background:
      linear-gradient(105deg, rgba(255,255,255,0) 22%, rgba(255,255,255,0.34) 48%, rgba(255,255,255,0.03) 62%, rgba(0,0,0,0.48) 100%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 44%, rgba(0,0,0,0.38) 100%);
    mix-blend-mode: screen;
  }

  /* Album art fills the vinyl */
  #artwork {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.36s ease, filter 0.5s ease, transform 0.5s ease;
  }
  #artwork.art-changing {
    opacity: 0.72;
    filter: saturate(0.86) brightness(0.78);
    transform: scale(1.035);
  }

  /* Groove overlay — drawn by canvas */
  #grooves {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Black center label */
  #label-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--label-radius) * 2);
    height: calc(var(--label-radius) * 2);
    border-radius: 50%;
    background: radial-gradient(circle at 50% 48%, #060606 0%, #010101 68%, #000 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.05),
      inset 0 0 18px rgba(255,255,255,0.035),
      0 10px 34px rgba(0,0,0,0.36);
  }

  /* Spindle */
  #spindle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--spindle-radius) * 2);
    height: calc(var(--spindle-radius) * 2);
    border-radius: 50%;
    background: #323232;
    border: 1px solid #1e1e1e;
    z-index: 10;
  }
  #spindle::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 50%;
    border: 1px solid #464646;
  }

  /* ── Static layer (doesn't rotate) ── */
  #static-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* ── Canvas progress ring (on the center label) ── */
  #progress-ring-canvas {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc((var(--ring-radius) * 2) + 40px);
    height: calc((var(--ring-radius) * 2) + 40px);
    z-index: 25;
    pointer-events: none;
  }

  /* ── Player info (frosted glass) ── */
  #pill {
    position: absolute;
    left: 50%;
    bottom: 82px;
    transform: translateX(-50%) translateY(12px);
    width: var(--pill-w);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 30;
    pointer-events: auto;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.075), rgba(255,255,255,0.02)),
      rgba(0, 0, 0, 0.62);
    -webkit-backdrop-filter: blur(28px) saturate(1.08);
    backdrop-filter: blur(28px) saturate(1.08);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: var(--pill-r);
    box-shadow:
      0 22px 60px rgba(0,0,0,0.42),
      inset 0 1px 0 rgba(255,255,255,0.14),
      inset 0 -1px 0 rgba(0,0,0,0.55);
    padding: 16px 34px 18px;
    opacity: 0;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  #pill.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Subtle text shadow — backdrop-filter handles contrast now */
  #pill-track, #pill-artist, #time-row {
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  #pill-track {
    font-size: 31px;
    font-weight: 500;
    line-height: 1.18;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: calc(var(--pill-w) - 68px);
    text-align: center;
    padding-bottom: 2px;
    transition: opacity 0.28s ease, transform 0.36s ease, filter 0.36s ease;
  }

  #pill-artist {
    margin-top: 7px;
    font-size: 21px;
    font-weight: 300;
    color: rgba(255,255,255,0.86);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: calc(var(--pill-w) - 92px);
    text-align: center;
    transition: opacity 0.28s ease, transform 0.36s ease, filter 0.36s ease;
  }

  #pill.metadata-out #pill-track,
  #pill.metadata-out #pill-artist {
    opacity: 0;
    transform: translateY(10px) scale(0.985);
    filter: blur(7px);
  }

  #pill.metadata-in #pill-track,
  #pill.metadata-in #pill-artist {
    animation: metadata-in 520ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  #time-row {
    width: 100%;
    margin-top: 13px;
    display: grid;
    grid-template-columns: 48px 1fr 58px;
    align-items: center;
    gap: 13px;
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.68);
    font-variant-numeric: tabular-nums;
  }

  #time-elapsed {
    text-align: right;
  }

  #time-remaining {
    text-align: left;
  }

  #time-bar {
    position: relative;
    height: 4px;
    overflow: hidden;
    border-radius: 999px;
    background:
      linear-gradient(to right, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.05),
      0 1px 7px rgba(0,0,0,0.28);
  }

  #time-fill {
    position: absolute;
    inset: 0;
    transform-origin: 0 50%;
    transform: scaleX(0);
    border-radius: inherit;
    background:
      linear-gradient(to right, rgba(255,255,255,0.58), rgba(255,255,255,0.96));
    box-shadow: 0 0 16px rgba(255,255,255,0.18);
    transition: transform 0.38s linear;
  }

  /* ── Playback controls ── */
  .skip-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    --swipe-strength: 0;
    width: 172px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.22s ease, transform 0.22s ease, filter 0.22s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .skip-btn::before {
    content: '';
    position: absolute;
    top: 24px; bottom: 24px;
    width: 160px;
    opacity: calc(var(--swipe-strength) * 0.78);
    transition: opacity 0.22s ease;
    pointer-events: none;
  }
  .skip-btn.visible { opacity: 0.22; }
  .skip-btn.visible.dragging {
    opacity: calc(0.28 + var(--swipe-strength) * 0.62);
    transform: translateY(-50%) scale(calc(1 + var(--swipe-strength) * 0.08));
    filter: drop-shadow(0 0 calc(18px + var(--swipe-strength) * 18px) rgba(255,255,255,0.18));
  }
  .skip-btn.confirm {
    animation: edge-confirm 360ms ease-out;
  }
  .skip-btn:active { opacity: 0.78; }
  #skip-prev { left: 0; }
  #skip-next { right: 0; }
  #skip-prev::before {
    left: 0;
    background: linear-gradient(to right, rgba(255,255,255,0.32), rgba(255,255,255,0));
  }
  #skip-next::before {
    right: 0;
    background: linear-gradient(to left, rgba(255,255,255,0.32), rgba(255,255,255,0));
  }
  .skip-btn svg {
    width: 58px;
    height: 58px;
    fill: rgba(255,255,255,0.78);
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.65));
  }
  #pause-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 190px; height: 190px;
    border-radius: 50%;
    z-index: 26;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Lyrics overlay (top half, frosted glass) ── */
  #lyrics-wrap {
    position: absolute;
    top: 34px;
    left: 50%;
    transform: translateX(-50%);
    width: 720px;
    height: 355px;
    padding: 54px 52px 60px;
    z-index: 28;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.6s;
    background:
      radial-gradient(ellipse at 50% 34%, rgba(255,255,255,0.06), rgba(255,255,255,0) 64%),
      rgba(0, 0, 0, 0.26);
    -webkit-backdrop-filter: blur(18px) saturate(1.05);
    backdrop-filter: blur(18px) saturate(1.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    /* Mask fades top/bottom — also softens the blur edges naturally */
    -webkit-mask-image: linear-gradient(to bottom,
      transparent 0%, transparent 9%, white 25%, white 66%, transparent 92%, transparent 100%);
    mask-image: linear-gradient(to bottom,
      transparent 0%, transparent 9%, white 25%, white 66%, transparent 92%, transparent 100%);
  }
  #lyrics-wrap.visible { opacity: 1; }

  #lyrics-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .lyric-line {
    font-size: 23px;
    font-weight: 400;
    line-height: 1.28;
    text-align: center;
    padding: 7px 20px;
    color: rgba(255,255,255,0.24);
    transition: color 0.35s, transform 0.35s, font-size 0.35s;
    text-shadow: 0 2px 12px rgba(0,0,0,0.58);
    white-space: normal;
    overflow: hidden;
    text-overflow: clip;
    max-width: 620px;
    max-height: 2.65em;
  }
  .lyric-line.active {
    color: #fff;
    font-size: 31px;
    font-weight: 500;
    transform: translateY(-1px);
    text-shadow:
      0 2px 16px rgba(0,0,0,0.72),
      0 0 28px rgba(255,255,255,0.18);
  }
  .lyric-line.past {
    color: rgba(255,255,255,0.38);
  }

  @keyframes edge-confirm {
    0% { opacity: 0.98; filter: drop-shadow(0 0 32px rgba(255,255,255,0.25)); }
    100% { opacity: 0.22; filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
  }

  @keyframes metadata-in {
    0% {
      opacity: 0;
      transform: translateY(-10px) scale(0.985);
      filter: blur(8px);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }
  }

  /* ── Screen dimmer (saves display after extended idle) ── */
  #dimmer {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease-in-out;
  }
  #dimmer.dim { opacity: 0.85; }
</style>
</head>
<body>

<div id="viewport">
  <!-- Vinyl record — this whole div rotates -->
  <div id="vinyl">
    <img id="artwork" src="" alt="" draggable="false" ondragstart="return false" onmousedown="return false">
    <canvas id="grooves" width="1080" height="1080"></canvas>
    <div id="label-center"></div>
  </div>

  <!-- Spindle (static, doesn't rotate) -->
  <div id="spindle"></div>

  <!-- Static overlay layer -->
  <div id="static-layer">
    <!-- Circular progress ring (canvas-based for smooth rendering) -->
    <canvas id="progress-ring-canvas" width="296" height="296"></canvas>

    <!-- Lyrics -->
    <div id="lyrics-wrap">
      <div id="lyrics-inner"></div>
    </div>

    <!-- Player pill -->
    <div id="pill">
      <div id="pill-track"></div>
      <div id="pill-artist"></div>
      <div id="time-row">
        <span id="time-elapsed">0:00</span>
        <div id="time-bar"><div id="time-fill"></div></div>
        <span id="time-remaining">-0:00</span>
      </div>
    </div>

    <!-- Skip buttons — semi-transparent triangles at outer edges -->
    <div id="skip-prev" class="skip-btn">
      <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16"/></svg>
    </div>
    <div id="skip-next" class="skip-btn">
      <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/></svg>
    </div>

    <!-- Tap-to-pause zone over center label -->
    <div id="pause-btn"></div>
  </div>

  <!-- Outer rim depth shadow — creates 3D recessed look -->
  <div id="rim-shadow"></div>

  <!-- Screen dimmer — fades to near-black after extended idle -->
  <div id="dimmer"></div>
</div>

<script>
(function() {
  "use strict";

  // ── Constants ──
  const SIZE = 1080;
  const CENTER = SIZE / 2;
  const GROOVE_COUNT = 120;
  const GROOVE_START = 100;
  const GROOVE_END = 530;
  const RPM = 33.333;
  const DEG_PER_MS = (RPM * 360) / 60000; // degrees per millisecond

  // Eased spin-up / spin-down duration (ms)
  const SPIN_RAMP = 4000;

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const viewport   = $("viewport");
  const vinyl      = $("vinyl");
  const artworkEl  = $("artwork");
  const pill       = $("pill");
  const pillTrack  = $("pill-track");
  const pillArtist = $("pill-artist");
  const timeElapsed = $("time-elapsed");
  const timeRemaining = $("time-remaining");
  const timeFill = $("time-fill");
  const progressCanvas = $("progress-ring-canvas");
  const progressCtx = progressCanvas.getContext("2d");
  const lyricsWrap = $("lyrics-wrap");
  const lyricsInner = $("lyrics-inner");
  const skipPrev   = $("skip-prev");
  const skipNext   = $("skip-next");
  const pauseBtn   = $("pause-btn");
  const dimmer     = $("dimmer");

  // Progress ring constants (canvas is 296x296 = 2x the CSS size for retina)
  const RING_CX = 148;
  const RING_CY = 148;
  const RING_R = 122;          // main arc radius (leave room for ticks + glow)
  const RING_TRACK_W = 2.2;    // background track width
  const RING_ARC_W = 6.5;      // progress arc width
  const RING_DOT_R = 9;        // dot outer radius
  const RING_DOT_INNER = 4.5;  // dot inner radius (creates ring shape)
  const TICK_COUNT = 60;        // minute-mark ticks around the ring
  const TICK_MAJOR_EVERY = 5;   // every 5th tick is longer

  // ── State ──
  let state = {
    isPlaying: false,
    progressMs: 0,
    durationMs: 1,
    trackId: null,
    trackName: "",
    artistName: "",
    albumName: "",
    artUrl: "",
    volume: 50,
    lastUpdate: performance.now(),
  };

  let pausedSince = 0;
  let screenDimmed = false;
  const DIM_DELAY = 5 * 60 * 1000;

  // Lyrics state
  let lyricsLines = [];      // [{time: ms, text: ""}, ...]
  let lyricsTrackId = null;
  let currentLyricIdx = -1;

  // Vinyl rotation state
  let currentAngle = 0;
  let spinSpeed = 0;        // 0 = stopped, 1 = full speed
  let spinTarget = 0;       // 0 or 1
  let spinStartTime = 0;
  let spinStartSpeed = 0;
  let lastFrameTime = performance.now();

  // Return-to-zero state
  let returningToZero = false;
  let returnStartAngle = 0;
  let returnStartTime = 0;
  const RETURN_DURATION = 1200; // ms to ease back to 0

  // Track transition state
  let metadataTimer = null;
  let flipStartTime = 0;
  let flipDirection = 1;
  const FLIP_DURATION = 920;

  // ── Draw grooves on canvas (once) ──
  function drawGrooves() {
    const canvas = $("grooves");
    const ctx = canvas.getContext("2d");
    const spacing = (GROOVE_END - GROOVE_START) / GROOVE_COUNT;

    for (let i = 0; i < GROOVE_COUNT; i++) {
      const r = GROOVE_START + i * spacing;
      const alpha = (15 + (i % 3) * 5) / 255;
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Outer rim
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, SIZE / 2 - 2, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(0,0,0,0.157)";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Helpers ──
  function fmt(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
  }

  async function api(method, path) {
    try {
      const resp = await fetch("/api" + path, { method });
      if (resp.ok && resp.status !== 204) return resp.json();
    } catch(e) {}
    return null;
  }

  // ── Lyrics ──
  function parseLRC(lrc) {
    if (!lrc) return [];
    const lines = [];
    for (const line of lrc.split("\n")) {
      const m = line.match(/^\[(\d+):(\d+)\.(\d+)\]\s*(.*)/);
      if (m) {
        const ms = parseInt(m[1]) * 60000 + parseInt(m[2]) * 1000 + parseInt(m[3]) * 10;
        const text = m[4].trim();
        if (text) lines.push({ time: ms, text });
      }
    }
    return lines;
  }

  async function fetchLyrics(trackName, artistName, albumName, durationSec) {
    try {
      const params = new URLSearchParams({
        track: trackName, artist: artistName,
        album: albumName, duration: String(durationSec)
      });
      const resp = await fetch("/api/lyrics?" + params);
      if (!resp.ok) return [];
      const data = await resp.json();
      return parseLRC(data.syncedLyrics);
    } catch(e) { return []; }
  }

  function renderLyricLines() {
    lyricsInner.innerHTML = "";
    if (!lyricsLines.length) {
      lyricsWrap.classList.remove("visible");
      return;
    }
    for (const line of lyricsLines) {
      const div = document.createElement("div");
      div.className = "lyric-line";
      div.textContent = line.text;
      lyricsInner.appendChild(div);
    }
    lyricsWrap.classList.add("visible");
    currentLyricIdx = -1;
  }

  function updateLyrics(nowMs) {
    if (!lyricsLines.length) return;

    let p = state.progressMs;
    if (state.isPlaying) p += nowMs - state.lastUpdate;
    p = Math.min(p, state.durationMs);

    // Find current line
    let idx = -1;
    for (let i = lyricsLines.length - 1; i >= 0; i--) {
      if (p >= lyricsLines[i].time) { idx = i; break; }
    }

    if (idx === currentLyricIdx) return;
    currentLyricIdx = idx;

    const els = lyricsInner.children;
    for (let i = 0; i < els.length; i++) {
      els[i].classList.toggle("active", i === idx);
      els[i].classList.toggle("past", i < idx);
    }

    // Scroll so active line is near top of visible area
    if (idx >= 0 && els[idx]) {
      const offset = els[idx].offsetTop - 118; // keep the active line in the focus lane
      lyricsInner.style.transform = `translateY(${-offset}px)`;
    }
  }

  // ── Easing: cubic ease-in-out ──
  function easeInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function easeOutQuint(t) {
    return 1 - Math.pow(1 - t, 5);
  }

  function applyVinylTransform(now) {
    let flipAngle = 0;
    let flipShift = 0;
    let flipScale = 1;
    let sheen = 0;

    if (flipStartTime) {
      const t = Math.min((now - flipStartTime) / FLIP_DURATION, 1);
      const wave = Math.sin(t * Math.PI);
      const resolve = easeOutQuint(t);
      flipAngle = flipDirection * wave * 78;
      flipShift = flipDirection * wave * 22;
      flipScale = 1 - wave * 0.045 + resolve * 0.01;
      sheen = wave * 0.82;

      if (t >= 1) {
        flipStartTime = 0;
        sheen = 0;
      }
    }

    vinyl.style.setProperty("--flip-sheen", sheen.toFixed(3));
    vinyl.style.transform =
      `translateX(${flipShift.toFixed(2)}px) rotateY(${flipAngle.toFixed(2)}deg) rotate(${currentAngle.toFixed(2)}deg) scale(${flipScale.toFixed(4)})`;
  }

  function startRecordFlip(direction) {
    flipDirection = direction === "previous" ? 1 : -1;
    flipStartTime = performance.now();
    artworkEl.classList.add("art-changing");
    window.setTimeout(() => artworkEl.classList.remove("art-changing"), FLIP_DURATION);
  }

  function setPillMetadata(trackName, artistName, animateChange) {
    if (metadataTimer) {
      window.clearTimeout(metadataTimer);
      metadataTimer = null;
    }

    if (!animateChange) {
      pill.classList.remove("metadata-out", "metadata-in");
      pillTrack.textContent = trackName;
      pillArtist.textContent = artistName;
      return;
    }

    pill.classList.remove("metadata-in");
    pill.classList.add("metadata-out");
    metadataTimer = window.setTimeout(() => {
      pillTrack.textContent = trackName;
      pillArtist.textContent = artistName;
      pill.classList.remove("metadata-out");
      pill.classList.add("metadata-in");
      metadataTimer = window.setTimeout(() => {
        pill.classList.remove("metadata-in");
        metadataTimer = null;
      }, 560);
    }, 190);
  }

  // ── Animation loop ──
  function animate(now) {
    requestAnimationFrame(animate);

    const dt = now - lastFrameTime;
    lastFrameTime = now;

    // --- Spin easing ---
    if (spinSpeed !== spinTarget) {
      const elapsed = now - spinStartTime;
      const t = Math.min(elapsed / SPIN_RAMP, 1);
      const eased = easeInOut(t);
      spinSpeed = spinStartSpeed + (spinTarget - spinStartSpeed) * eased;
      if (t >= 1) {
        spinSpeed = spinTarget;
        // When fully stopped, start return-to-zero
        if (spinTarget === 0 && !returningToZero && Math.abs(currentAngle % 360) > 0.5) {
          returningToZero = true;
          returnStartAngle = currentAngle % 360;
          returnStartTime = now;
        }
      }
    }

    // --- Return to 0 degrees when stopped ---
    if (returningToZero && spinSpeed === 0) {
      const elapsed = now - returnStartTime;
      const t = Math.min(elapsed / RETURN_DURATION, 1);
      const eased = easeInOut(t);
      // Take shortest path to 0
      let target = 0;
      if (returnStartAngle > 180) target = 360;
      currentAngle = returnStartAngle + (target - returnStartAngle) * eased;
      if (t >= 1) {
        currentAngle = 0;
        returningToZero = false;
      }
    }
    // --- Rotate vinyl ---
    else if (spinSpeed > 0.001) {
      returningToZero = false;
      currentAngle += DEG_PER_MS * dt * spinSpeed;
      currentAngle %= 360;
    }

    applyVinylTransform(now);

    // --- Progress ring ---
    updateProgressRing(now);

    // --- Lyrics ---
    updateLyrics(now);

    // --- Screen dim after extended idle/paused state ---
    const timePaused = pausedSince > 0 ? now - pausedSince : 0;
    const shouldDim = !state.isPlaying && timePaused >= DIM_DELAY;
    if (shouldDim && !screenDimmed) {
      dimmer.classList.add("dim");
      screenDimmed = true;
    } else if (!shouldDim && screenDimmed) {
      dimmer.classList.remove("dim");
      screenDimmed = false;
    }
  }

  function updateProgressRing(now) {
    if (!state.trackId) {
      progressCtx.clearRect(0, 0, 296, 296);
      timeElapsed.textContent = "0:00";
      timeRemaining.textContent = "-0:00";
      timeFill.style.transform = "scaleX(0)";
      return;
    }

    let p = state.progressMs;
    if (state.isPlaying) {
      p += now - state.lastUpdate;
    }
    p = Math.min(p, state.durationMs);
    const pct = p / Math.max(state.durationMs, 1);

    const ctx = progressCtx;
    const cx = RING_CX, cy = RING_CY, r = RING_R;
    const startAngle = -Math.PI / 2; // 12 o'clock

    ctx.clearRect(0, 0, 296, 296);

    // ── Tick marks (watch-style) ──
    for (let i = 0; i < TICK_COUNT; i++) {
      const angle = startAngle + (i / TICK_COUNT) * Math.PI * 2;
      const major = i % TICK_MAJOR_EVERY === 0;
      const len = major ? 10 : 4;
      const gap = 4;
      const tickR1 = r + gap;
      const tickR2 = r + gap + len;
      const x1 = cx + tickR1 * Math.cos(angle);
      const y1 = cy + tickR1 * Math.sin(angle);
      const x2 = cx + tickR2 * Math.cos(angle);
      const y2 = cy + tickR2 * Math.sin(angle);

      // Ticks that have been "passed" by progress glow brighter
      const tickPct = i / TICK_COUNT;
      const passed = tickPct <= pct;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      if (passed) {
        ctx.strokeStyle = major ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.2)";
      } else {
        ctx.strokeStyle = major ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.06)";
      }
      ctx.lineWidth = major ? 1.5 : 0.8;
      ctx.stroke();
    }

    // ── Background track ──
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = RING_TRACK_W;
    ctx.stroke();

    if (pct <= 0) {
      timeElapsed.textContent = fmt(p);
      timeRemaining.textContent = "-" + fmt(state.durationMs - p);
      timeFill.style.transform = "scaleX(0)";
      return;
    }

    // ── Progress arc with gradient ──
    const endAngle = startAngle + pct * Math.PI * 2;

    // Create a conical-style gradient by drawing many small segments
    const segments = Math.max(2, Math.floor(pct * 200));
    for (let i = 0; i < segments; i++) {
      const t0 = i / segments;
      const t1 = (i + 1.5) / segments; // slight overlap to avoid gaps
      const a0 = startAngle + t0 * pct * Math.PI * 2;
      const a1 = startAngle + Math.min(t1, 1) * pct * Math.PI * 2;

      // Gradient: dim warm → bright white along the arc
      const t = t0;
      const alpha = 0.3 + t * 0.7;
      // Warm-to-white: start with subtle warm tint, end pure white
      const rr = Math.round(180 + t * 75);
      const gg = Math.round(170 + t * 85);
      const bb = Math.round(160 + t * 95);

      ctx.beginPath();
      ctx.arc(cx, cy, r, a0, a1);
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${alpha})`;
      ctx.lineWidth = RING_ARC_W;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    // ── Glow behind the leading edge ──
    const glowAngle = endAngle;
    const glowX = cx + r * Math.cos(glowAngle);
    const glowY = cy + r * Math.sin(glowAngle);
    const glow = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, 18);
    glow.addColorStop(0, "rgba(255,255,255,0.25)");
    glow.addColorStop(0.5, "rgba(255,255,255,0.08)");
    glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.beginPath();
    ctx.arc(glowX, glowY, 18, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // ── Dot at the leading edge ──
    const dotX = cx + r * Math.cos(endAngle);
    const dotY = cy + r * Math.sin(endAngle);

    // Outer ring
    ctx.beginPath();
    ctx.arc(dotX, dotY, RING_DOT_R, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // Inner cutout (creates a ring/donut shape)
    ctx.beginPath();
    ctx.arc(dotX, dotY, RING_DOT_INNER, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(30,30,30,0.9)";
    ctx.fill();

    // Tiny bright center
    ctx.beginPath();
    ctx.arc(dotX, dotY, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();

    // Pause icon — two vertical bars in center when paused
    if (!state.isPlaying && state.trackId) {
      const barW = 5, barH = 24, gap = 8;
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.beginPath();
      ctx.roundRect(cx - gap/2 - barW, cy - barH/2, barW, barH, 2);
      ctx.fill();
      ctx.beginPath();
      ctx.roundRect(cx + gap/2, cy - barH/2, barW, barH, 2);
      ctx.fill();
    }

    // Time display
    timeElapsed.textContent = fmt(p);
    timeRemaining.textContent = "-" + fmt(state.durationMs - p);
    timeFill.style.transform = `scaleX(${pct.toFixed(4)})`;
  }

  // ── Spin control ──
  function setSpinTarget(target) {
    if (spinTarget === target) return;
    spinTarget = target;
    spinStartTime = performance.now();
    spinStartSpeed = spinSpeed;
  }

  // ── Poll Spotify ──
  async function poll() {
    const data = await api("GET", "/now-playing");
    if (!data || !data.item) {
      state.trackId = null;
      state.isPlaying = false;
      state.progressMs = 0;
      state.durationMs = 1;
      state.trackName = "";
      state.artistName = "";
      state.albumName = "";
      if (!pausedSince) pausedSince = performance.now();
      setPillMetadata("", "", false);
      timeElapsed.textContent = "0:00";
      timeRemaining.textContent = "-0:00";
      timeFill.style.transform = "scaleX(0)";
      pill.classList.remove("visible");
      skipPrev.classList.remove("visible");
      skipNext.classList.remove("visible");
      lyricsLines = [];
      lyricsTrackId = null;
      currentLyricIdx = -1;
      lyricsInner.innerHTML = "";
      lyricsWrap.classList.remove("visible");
      setSpinTarget(0);
      return;
    }

    const track = data.item;
    const newId = track.id;
    pill.classList.add("visible");

    // Art
    const images = (track.album || {}).images || [];
    const artUrl = images.length ? images[0].url : "";
    if (artUrl && artUrl !== state.artUrl) {
      state.artUrl = artUrl;
      const preload = new Image();
      preload.onload = () => { artworkEl.src = artUrl; };
      preload.src = artUrl;
    }

    // Track info
    if (newId !== state.trackId) {
      const hadTrack = !!state.trackId;
      state.trackId = newId;
      state.trackName = track.name || "";
      state.artistName = (track.artists || []).map(a => a.name).join(", ");
      state.albumName = (track.album || {}).name || "";
      setPillMetadata(state.trackName, state.artistName, hadTrack);
      if (hadTrack && !flipStartTime) {
        startRecordFlip("next");
      }

      // Fetch lyrics for new track
      if (newId !== lyricsTrackId) {
        lyricsTrackId = newId;
        lyricsLines = [];
        lyricsWrap.classList.remove("visible");
        currentLyricIdx = -1;
        const durSec = Math.round((track.duration_ms || 0) / 1000);
        fetchLyrics(state.trackName, state.artistName, state.albumName, durSec)
          .then(lines => {
            if (lyricsTrackId === newId) {
              lyricsLines = lines;
              renderLyricLines();
            }
          });
      }
    }

    // Playback
    state.isPlaying = data.is_playing || false;
    state.progressMs = data.progress_ms || 0;
    state.durationMs = track.duration_ms || 1;
    state.lastUpdate = performance.now();

    // Pause/idle tracking for screen dimming
    if (!state.isPlaying && !pausedSince) {
      pausedSince = performance.now();
    } else if (state.isPlaying) {
      pausedSince = 0;
    }

    // Spin
    setSpinTarget(state.isPlaying ? 1 : 0);

    // Show controls when track is loaded
    skipPrev.classList.toggle("visible", !!state.trackId);
    skipNext.classList.toggle("visible", !!state.trackId);
  }

  async function readControlResponse(resp) {
    try {
      return await resp.json();
    } catch(e) {
      return {};
    }
  }

  // ── Playback controls ──
  async function controlAction(action) {
    try {
      const resp = await fetch("/api/control/" + action, { method: "POST" });
      const data = await readControlResponse(resp);
      if (!resp.ok) {
        console.warn("Control failed:", action, data.error || resp.status);
        return false;
      }
      setTimeout(poll, 300);
      return true;
    } catch(e) {
      console.warn("Control request failed:", action, e);
      return false;
    }
  }

  skipPrev.addEventListener("click", async () => {
    if (await controlAction("previous")) {
      startRecordFlip("previous");
      confirmSwipe("previous");
    }
  });
  skipNext.addEventListener("click", async () => {
    if (await controlAction("next")) {
      startRecordFlip("next");
      confirmSwipe("next");
    }
  });
  pauseBtn.addEventListener("click", async () => {
    if (performance.now() < suppressTapUntil) return;
    await controlAction("play-pause");
  });

  // ── Swipe gestures (skip track) ──
  let swipeGesture = null;
  let lastSwipeAt = 0;
  let suppressTapUntil = 0;
  const SWIPE_MAX_TIME = 800;
  const SWIPE_COOLDOWN = 900;
  const SWIPE_VERTICAL_RATIO = 0.55;
  const SWIPE_MIN_VELOCITY = 0.25;

  function swipeThreshold() {
    return Math.max(96, viewport.clientWidth * 0.1);
  }

  function clearSwipeFeedback() {
    for (const el of [skipPrev, skipNext]) {
      el.classList.remove("dragging");
      el.style.setProperty("--swipe-strength", "0");
    }
  }

  function showSwipeFeedback(dx) {
    if (!state.trackId) return;
    const target = dx > 0 ? skipPrev : skipNext;
    const other = dx > 0 ? skipNext : skipPrev;
    const strength = Math.min(Math.abs(dx) / swipeThreshold(), 1);

    other.classList.remove("dragging");
    other.style.setProperty("--swipe-strength", "0");
    target.classList.add("dragging");
    target.style.setProperty("--swipe-strength", strength.toFixed(2));
  }

  function confirmSwipe(direction) {
    const target = direction === "previous" ? skipPrev : skipNext;
    target.classList.remove("dragging");
    target.classList.add("confirm");
    target.style.setProperty("--swipe-strength", "1");
    window.setTimeout(() => {
      target.classList.remove("confirm");
      target.style.setProperty("--swipe-strength", "0");
    }, 360);
  }

  viewport.addEventListener("pointerdown", e => {
    if (!state.trackId || swipeGesture) return;
    swipeGesture = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      startTime: performance.now(),
      captured: false,
      swipeInProgress: false,
    };
    clearSwipeFeedback();
  });

  viewport.addEventListener("pointermove", e => {
    if (!swipeGesture || e.pointerId !== swipeGesture.pointerId) return;

    const dx = e.clientX - swipeGesture.startX;
    const dy = e.clientY - swipeGesture.startY;
    const horizontalEnough = Math.abs(dx) > 18 && Math.abs(dx) > Math.abs(dy) * 1.25;

    swipeGesture.swipeInProgress = horizontalEnough;
    if (horizontalEnough) {
      if (!swipeGesture.captured && viewport.setPointerCapture) {
        viewport.setPointerCapture(e.pointerId);
        swipeGesture.captured = true;
      }
      showSwipeFeedback(dx);
      e.preventDefault();
    } else {
      clearSwipeFeedback();
    }
  }, { passive: false });

  viewport.addEventListener("pointerup", e => {
    if (!swipeGesture || e.pointerId !== swipeGesture.pointerId) return;

    const now = performance.now();
    const dx = e.clientX - swipeGesture.startX;
    const dy = e.clientY - swipeGesture.startY;
    const dt = Math.max(now - swipeGesture.startTime, 1);
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    const threshold = swipeThreshold();
    const velocity = absX / dt;
    const canSwipeAgain = now - lastSwipeAt >= SWIPE_COOLDOWN;
    const shouldSkip =
      canSwipeAgain &&
      dt <= SWIPE_MAX_TIME &&
      absX >= threshold &&
      absY <= absX * SWIPE_VERTICAL_RATIO &&
      velocity >= SWIPE_MIN_VELOCITY;

    if (shouldSkip) {
      const action = dx < 0 ? "next" : "previous";
      lastSwipeAt = now;
      suppressTapUntil = now + 650;
      clearSwipeFeedback();
      controlAction(action).then(ok => {
        if (ok) {
          startRecordFlip(action);
          confirmSwipe(action);
        }
      });
      e.preventDefault();
    } else {
      clearSwipeFeedback();
    }

    if (swipeGesture.captured && viewport.releasePointerCapture) {
      viewport.releasePointerCapture(e.pointerId);
    }
    swipeGesture = null;
  }, { passive: false });

  viewport.addEventListener("pointercancel", e => {
    if (!swipeGesture || e.pointerId !== swipeGesture.pointerId) return;
    clearSwipeFeedback();
    if (swipeGesture.captured && viewport.releasePointerCapture) {
      viewport.releasePointerCapture(e.pointerId);
    }
    swipeGesture = null;
  });

  // ── Prevent all image/element dragging ──
  document.addEventListener("dragstart", e => e.preventDefault());

  // ── Init ──
  drawGrooves();
  requestAnimationFrame(animate);
  poll();
  setInterval(poll, 2000);

})();
</script>
</body>
</html>
