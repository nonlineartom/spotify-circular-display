<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080, user-scalable=no">
<title>Spotify Vinyl Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --size: 1080px;
    --center: 540px;
    --groove-start: 100;
    --groove-end: 530;
    --label-radius: 80px;
    --ring-radius: 74px;
    --spindle-radius: 14px;
    --pill-w: 460px;
    --pill-h: 140px;
    --pill-r: 22px;
  }

  html, body {
    width: var(--size); height: var(--size);
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    cursor: none;
    user-select: none;
  }

  #viewport {
    position: relative;
    width: var(--size); height: var(--size);
    border-radius: 50%;
    overflow: hidden;
  }

  /* ── Outer rim depth shadow (static, on top of everything) ── */
  #rim-shadow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 40;
    pointer-events: none;
    /* Multi-layered inset shadow for realistic depth */
    box-shadow:
      /* Outer bevel — dark ring at very edge */
      inset 0 0 0 3px rgba(0,0,0,0.5),
      /* Top highlight — subtle light catch */
      inset 0 4px 8px rgba(255,255,255,0.08),
      /* Bottom shadow — depth underneath */
      inset 0 -6px 16px rgba(0,0,0,0.6),
      /* Soft wide inner vignette */
      inset 0 0 60px rgba(0,0,0,0.4),
      /* Tighter vignette near edge */
      inset 0 0 120px rgba(0,0,0,0.15),
      /* Outer glow/shadow on the desk */
      0 4px 20px rgba(0,0,0,0.8),
      0 0 40px rgba(0,0,0,0.3);
  }

  /* ── Vinyl record (rotates) ── */
  #vinyl {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    will-change: transform;
    transition: none;
    -webkit-user-drag: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Album art fills the vinyl */
  #artwork {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
  }

  /* Groove overlay — drawn by canvas */
  #grooves {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Black center label */
  #label-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--label-radius) * 2);
    height: calc(var(--label-radius) * 2);
    border-radius: 50%;
    background: #000;
  }

  /* Spindle */
  #spindle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--spindle-radius) * 2);
    height: calc(var(--spindle-radius) * 2);
    border-radius: 50%;
    background: #323232;
    border: 1px solid #1e1e1e;
    z-index: 10;
  }
  #spindle::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 50%;
    border: 1px solid #464646;
  }

  /* ── Static layer (doesn't rotate) ── */
  #static-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* ── Canvas progress ring (on the center label) ── */
  #progress-ring-canvas {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--ring-radius) * 2);
    height: calc(var(--ring-radius) * 2);
    z-index: 25;
    pointer-events: none;
  }

  /* ── Player info (frosted glass) ── */
  #pill {
    position: absolute;
    left: 50%;
    bottom: 100px;
    transform: translateX(-50%);
    width: var(--pill-w);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 30;
    pointer-events: auto;
    background: rgba(0, 0, 0, 0.35);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 14px 28px;
  }

  /* Subtle text shadow — backdrop-filter handles contrast now */
  #pill-track, #pill-artist, #pill-time {
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  #pill-track {
    font-size: 28px;
    font-weight: 500;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 440px;
    text-align: center;
    padding-bottom: 2px;
  }

  #pill-artist {
    margin-top: 4px;
    font-size: 19px;
    font-weight: 300;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 440px;
    text-align: center;
  }

  #pill-time {
    margin-top: 6px;
    font-size: 14px;
    font-weight: 300;
    color: #ddd;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }

  /* ── Playback controls ── */
  .skip-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    width: 80px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .skip-btn.visible { opacity: 1; }
  .skip-btn:active { opacity: 0.6; }
  #skip-prev { left: 30px; }
  #skip-next { right: 30px; }
  .skip-btn svg {
    width: 28px;
    height: 28px;
    fill: rgba(255,255,255,0.45);
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
  }
  #pause-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 148px; height: 148px;
    border-radius: 50%;
    z-index: 26;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Lyrics overlay (top half, frosted glass) ── */
  #lyrics-wrap {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 660px;
    height: 560px;
    padding: 80px 40px;
    z-index: 28;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.6s;
    background: rgba(0, 0, 0, 0.25);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border-radius: 30px;
    /* Mask fades top/bottom — also softens the blur edges naturally */
    -webkit-mask-image: linear-gradient(to bottom,
      transparent 0%, transparent 8%, white 22%, white 58%, transparent 88%, transparent 100%);
    mask-image: linear-gradient(to bottom,
      transparent 0%, transparent 8%, white 22%, white 58%, transparent 88%, transparent 100%);
  }
  #lyrics-wrap.visible { opacity: 1; }

  #lyrics-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .lyric-line {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.5;
    text-align: center;
    padding: 6px 20px;
    color: rgba(255,255,255,0.35);
    transition: color 0.4s, transform 0.4s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 580px;
  }
  .lyric-line.active {
    color: #fff;
    transform: scale(1.05);
  }
  .lyric-line.past {
    color: rgba(255,255,255,0.5);
  }

  /* ── QR overlay (vinyl-styled, shown on pause/idle) ── */
  #qr-overlay {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    z-index: 35;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
  }
  #qr-overlay.visible { opacity: 1; }

  /* "Scan to connect" label */
  #qr-label {
    position: absolute;
    bottom: 58px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 36;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }
  #qr-label.visible { opacity: 1; }

  /* ── Screen dimmer (saves display after extended idle) ── */
  #dimmer {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease-in-out;
  }
  #dimmer.dim { opacity: 0.85; }
</style>
</head>
<body>

<div id="viewport">
  <!-- Vinyl record — this whole div rotates -->
  <div id="vinyl">
    <img id="artwork" src="" alt="" draggable="false" ondragstart="return false" onmousedown="return false">
    <canvas id="grooves" width="1080" height="1080"></canvas>
    <div id="label-center"></div>
  </div>

  <!-- Spindle (static, doesn't rotate) -->
  <div id="spindle"></div>

  <!-- Static overlay layer -->
  <div id="static-layer">
    <!-- Circular progress ring (canvas-based for smooth rendering) -->
    <canvas id="progress-ring-canvas" width="296" height="296"></canvas>

    <!-- Lyrics -->
    <div id="lyrics-wrap">
      <div id="lyrics-inner"></div>
    </div>

    <!-- Player pill -->
    <div id="pill">
      <div id="pill-track"></div>
      <div id="pill-artist"></div>
      <div id="pill-time"></div>
    </div>

    <!-- Skip buttons — semi-transparent triangles at outer edges -->
    <div id="skip-prev" class="skip-btn">
      <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16"/></svg>
    </div>
    <div id="skip-next" class="skip-btn">
      <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/></svg>
    </div>

    <!-- Tap-to-pause zone over center label -->
    <div id="pause-btn"></div>
  </div>

  <!-- QR overlay (vinyl-styled, shown after 30s pause or idle) -->
  <canvas id="qr-overlay" width="1080" height="1080"></canvas>
  <div id="qr-label">Scan to connect</div>

  <!-- Outer rim depth shadow — creates 3D recessed look -->
  <div id="rim-shadow"></div>

  <!-- Screen dimmer — fades to near-black after extended idle -->
  <div id="dimmer"></div>
</div>

<script>
(function() {
  "use strict";

  // ── Constants ──
  const SIZE = 1080;
  const CENTER = SIZE / 2;
  const GROOVE_COUNT = 120;
  const GROOVE_START = 100;
  const GROOVE_END = 530;
  const LABEL_RADIUS = 80;
  const RING_RADIUS = 74;
  const RPM = 33.333;
  const DEG_PER_MS = (RPM * 360) / 60000; // degrees per millisecond

  // Eased spin-up / spin-down duration (ms)
  const SPIN_RAMP = 4000;

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const vinyl      = $("vinyl");
  const artworkEl  = $("artwork");
  const qrOverlay  = $("qr-overlay");
  const pillTrack  = $("pill-track");
  const pillArtist = $("pill-artist");
  const pillTime   = $("pill-time");
  const progressCanvas = $("progress-ring-canvas");
  const progressCtx = progressCanvas.getContext("2d");
  const lyricsWrap = $("lyrics-wrap");
  const lyricsInner = $("lyrics-inner");
  const qrLabel    = $("qr-label");
  const skipPrev   = $("skip-prev");
  const skipNext   = $("skip-next");
  const pauseBtn   = $("pause-btn");
  const dimmer     = $("dimmer");

  // Progress ring constants (canvas is 296x296 = 2x the CSS size for retina)
  const RING_CX = 148;
  const RING_CY = 148;
  const RING_R = 128;          // main arc radius (leave room for ticks + glow)
  const RING_TRACK_W = 1.5;    // background track width
  const RING_ARC_W = 4.5;      // progress arc width
  const RING_DOT_R = 7;        // dot outer radius
  const RING_DOT_INNER = 3.5;  // dot inner radius (creates ring shape)
  const TICK_COUNT = 60;        // minute-mark ticks around the ring
  const TICK_MAJOR_EVERY = 5;   // every 5th tick is longer

  // ── State ──
  let state = {
    isPlaying: false,
    progressMs: 0,
    durationMs: 1,
    trackId: null,
    trackName: "",
    artistName: "",
    albumName: "",
    artUrl: "",
    volume: 50,
    lastUpdate: performance.now(),
  };

  // QR overlay state
  let pausedSince = 0;
  let qrOverlayVisible = false;
  let qrMatrix = null;
  let screenDimmed = false;
  const DIM_DELAY = 5 * 60 * 1000; // 5 minutes after QR appears

  // Lyrics state
  let lyricsLines = [];      // [{time: ms, text: ""}, ...]
  let lyricsTrackId = null;
  let currentLyricIdx = -1;

  // Vinyl rotation state
  let currentAngle = 0;
  let spinSpeed = 0;        // 0 = stopped, 1 = full speed
  let spinTarget = 0;       // 0 or 1
  let spinStartTime = 0;
  let spinStartSpeed = 0;
  let lastFrameTime = performance.now();

  // Return-to-zero state
  let returningToZero = false;
  let returnStartAngle = 0;
  let returnStartTime = 0;
  const RETURN_DURATION = 1200; // ms to ease back to 0

  // ── Draw grooves on canvas (once) ──
  function drawGrooves() {
    const canvas = $("grooves");
    const ctx = canvas.getContext("2d");
    const spacing = (GROOVE_END - GROOVE_START) / GROOVE_COUNT;

    for (let i = 0; i < GROOVE_COUNT; i++) {
      const r = GROOVE_START + i * spacing;
      const alpha = (15 + (i % 3) * 5) / 255;
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Outer rim
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, SIZE / 2 - 2, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(0,0,0,0.157)";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Helpers ──
  function fmt(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
  }

  async function api(method, path) {
    try {
      const resp = await fetch("/api" + path, { method });
      if (resp.ok && resp.status !== 204) return resp.json();
    } catch(e) {}
    return null;
  }

  // ── Lyrics ──
  function parseLRC(lrc) {
    if (!lrc) return [];
    const lines = [];
    for (const line of lrc.split("\n")) {
      const m = line.match(/^\[(\d+):(\d+)\.(\d+)\]\s*(.*)/);
      if (m) {
        const ms = parseInt(m[1]) * 60000 + parseInt(m[2]) * 1000 + parseInt(m[3]) * 10;
        const text = m[4].trim();
        if (text) lines.push({ time: ms, text });
      }
    }
    return lines;
  }

  async function fetchLyrics(trackName, artistName, albumName, durationSec) {
    try {
      const params = new URLSearchParams({
        track: trackName, artist: artistName,
        album: albumName, duration: String(durationSec)
      });
      const resp = await fetch("/api/lyrics?" + params);
      if (!resp.ok) return [];
      const data = await resp.json();
      return parseLRC(data.syncedLyrics);
    } catch(e) { return []; }
  }

  function renderLyricLines() {
    lyricsInner.innerHTML = "";
    if (!lyricsLines.length) {
      lyricsWrap.classList.remove("visible");
      return;
    }
    for (const line of lyricsLines) {
      const div = document.createElement("div");
      div.className = "lyric-line";
      div.textContent = line.text;
      lyricsInner.appendChild(div);
    }
    lyricsWrap.classList.add("visible");
    currentLyricIdx = -1;
  }

  function updateLyrics(nowMs) {
    if (!lyricsLines.length) return;

    let p = state.progressMs;
    if (state.isPlaying) p += nowMs - state.lastUpdate;
    p = Math.min(p, state.durationMs);

    // Find current line
    let idx = -1;
    for (let i = lyricsLines.length - 1; i >= 0; i--) {
      if (p >= lyricsLines[i].time) { idx = i; break; }
    }

    if (idx === currentLyricIdx) return;
    currentLyricIdx = idx;

    const els = lyricsInner.children;
    for (let i = 0; i < els.length; i++) {
      els[i].classList.toggle("active", i === idx);
      els[i].classList.toggle("past", i < idx);
    }

    // Scroll so active line is near top of visible area
    if (idx >= 0 && els[idx]) {
      const lineH = els[idx].offsetHeight;
      const offset = els[idx].offsetTop - 100; // 100px from top of container
      lyricsInner.style.transform = `translateY(${-offset}px)`;
    }
  }

  // ── Easing: cubic ease-in-out ──
  function easeInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  // ── Animation loop ──
  function animate(now) {
    requestAnimationFrame(animate);

    const dt = now - lastFrameTime;
    lastFrameTime = now;

    // --- Spin easing ---
    if (spinSpeed !== spinTarget) {
      const elapsed = now - spinStartTime;
      const t = Math.min(elapsed / SPIN_RAMP, 1);
      const eased = easeInOut(t);
      spinSpeed = spinStartSpeed + (spinTarget - spinStartSpeed) * eased;
      if (t >= 1) {
        spinSpeed = spinTarget;
        // When fully stopped, start return-to-zero
        if (spinTarget === 0 && !returningToZero && Math.abs(currentAngle % 360) > 0.5) {
          returningToZero = true;
          returnStartAngle = currentAngle % 360;
          returnStartTime = now;
        }
      }
    }

    // --- Return to 0 degrees when stopped ---
    if (returningToZero && spinSpeed === 0) {
      const elapsed = now - returnStartTime;
      const t = Math.min(elapsed / RETURN_DURATION, 1);
      const eased = easeInOut(t);
      // Take shortest path to 0
      let target = 0;
      if (returnStartAngle > 180) target = 360;
      currentAngle = returnStartAngle + (target - returnStartAngle) * eased;
      if (t >= 1) {
        currentAngle = 0;
        returningToZero = false;
      }
      vinyl.style.transform = `rotate(${currentAngle.toFixed(2)}deg)`;
    }
    // --- Rotate vinyl ---
    else if (spinSpeed > 0.001) {
      returningToZero = false;
      currentAngle += DEG_PER_MS * dt * spinSpeed;
      currentAngle %= 360;
      vinyl.style.transform = `rotate(${currentAngle.toFixed(2)}deg)`;
    }

    // --- Progress ring ---
    updateProgressRing(now);

    // --- Lyrics ---
    updateLyrics(now);

    // --- QR overlay (show after 30s pause, or immediately when idle) ---
    const timePaused = pausedSince > 0 ? now - pausedSince : 0;
    const showQR = !state.trackId || (!state.isPlaying && timePaused >= 30000);
    if (showQR && !qrOverlayVisible) {
      qrOverlay.classList.add("visible");
      qrLabel.classList.add("visible");
      qrOverlayVisible = true;
    } else if (!showQR && qrOverlayVisible) {
      qrOverlay.classList.remove("visible");
      qrLabel.classList.remove("visible");
      qrOverlayVisible = false;
    }

    // --- Screen dim after 5 min of QR visible ---
    const shouldDim = qrOverlayVisible && timePaused >= 30000 + DIM_DELAY;
    if (shouldDim && !screenDimmed) {
      dimmer.classList.add("dim");
      screenDimmed = true;
    } else if (!shouldDim && screenDimmed) {
      dimmer.classList.remove("dim");
      screenDimmed = false;
    }
  }

  function updateProgressRing(now) {
    let p = state.progressMs;
    if (state.isPlaying) {
      p += now - state.lastUpdate;
    }
    p = Math.min(p, state.durationMs);
    const pct = p / Math.max(state.durationMs, 1);

    const ctx = progressCtx;
    const cx = RING_CX, cy = RING_CY, r = RING_R;
    const startAngle = -Math.PI / 2; // 12 o'clock

    ctx.clearRect(0, 0, 296, 296);

    // ── Tick marks (watch-style) ──
    for (let i = 0; i < TICK_COUNT; i++) {
      const angle = startAngle + (i / TICK_COUNT) * Math.PI * 2;
      const major = i % TICK_MAJOR_EVERY === 0;
      const len = major ? 10 : 4;
      const gap = 4;
      const tickR1 = r + gap;
      const tickR2 = r + gap + len;
      const x1 = cx + tickR1 * Math.cos(angle);
      const y1 = cy + tickR1 * Math.sin(angle);
      const x2 = cx + tickR2 * Math.cos(angle);
      const y2 = cy + tickR2 * Math.sin(angle);

      // Ticks that have been "passed" by progress glow brighter
      const tickPct = i / TICK_COUNT;
      const passed = tickPct <= pct;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      if (passed) {
        ctx.strokeStyle = major ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.2)";
      } else {
        ctx.strokeStyle = major ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.06)";
      }
      ctx.lineWidth = major ? 1.5 : 0.8;
      ctx.stroke();
    }

    // ── Background track ──
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = RING_TRACK_W;
    ctx.stroke();

    if (pct <= 0) {
      pillTime.textContent = fmt(p) + "  /  -" + fmt(state.durationMs - p);
      return;
    }

    // ── Progress arc with gradient ──
    const endAngle = startAngle + pct * Math.PI * 2;

    // Create a conical-style gradient by drawing many small segments
    const segments = Math.max(2, Math.floor(pct * 200));
    for (let i = 0; i < segments; i++) {
      const t0 = i / segments;
      const t1 = (i + 1.5) / segments; // slight overlap to avoid gaps
      const a0 = startAngle + t0 * pct * Math.PI * 2;
      const a1 = startAngle + Math.min(t1, 1) * pct * Math.PI * 2;

      // Gradient: dim warm → bright white along the arc
      const t = t0;
      const alpha = 0.3 + t * 0.7;
      // Warm-to-white: start with subtle warm tint, end pure white
      const rr = Math.round(180 + t * 75);
      const gg = Math.round(170 + t * 85);
      const bb = Math.round(160 + t * 95);

      ctx.beginPath();
      ctx.arc(cx, cy, r, a0, a1);
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${alpha})`;
      ctx.lineWidth = RING_ARC_W;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    // ── Glow behind the leading edge ──
    const glowAngle = endAngle;
    const glowX = cx + r * Math.cos(glowAngle);
    const glowY = cy + r * Math.sin(glowAngle);
    const glow = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, 18);
    glow.addColorStop(0, "rgba(255,255,255,0.25)");
    glow.addColorStop(0.5, "rgba(255,255,255,0.08)");
    glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.beginPath();
    ctx.arc(glowX, glowY, 18, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // ── Dot at the leading edge ──
    const dotX = cx + r * Math.cos(endAngle);
    const dotY = cy + r * Math.sin(endAngle);

    // Outer ring
    ctx.beginPath();
    ctx.arc(dotX, dotY, RING_DOT_R, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // Inner cutout (creates a ring/donut shape)
    ctx.beginPath();
    ctx.arc(dotX, dotY, RING_DOT_INNER, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(30,30,30,0.9)";
    ctx.fill();

    // Tiny bright center
    ctx.beginPath();
    ctx.arc(dotX, dotY, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();

    // Pause icon — two vertical bars in center when paused
    if (!state.isPlaying && state.trackId) {
      const barW = 5, barH = 24, gap = 8;
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.beginPath();
      ctx.roundRect(cx - gap/2 - barW, cy - barH/2, barW, barH, 2);
      ctx.fill();
      ctx.beginPath();
      ctx.roundRect(cx + gap/2, cy - barH/2, barW, barH, 2);
      ctx.fill();
    }

    // Time display
    pillTime.textContent = fmt(p) + "  /  -" + fmt(state.durationMs - p);
  }

  // ── Spin control ──
  function setSpinTarget(target) {
    if (spinTarget === target) return;
    spinTarget = target;
    spinStartTime = performance.now();
    spinStartSpeed = spinSpeed;
  }

  // ── Poll Spotify ──
  async function poll() {
    const data = await api("GET", "/now-playing");
    if (!data || !data.item) {
      state.trackId = null;
      state.isPlaying = false;
      if (!pausedSince) pausedSince = performance.now();
      setSpinTarget(0);
      return;
    }

    const track = data.item;
    const newId = track.id;

    // Art
    const images = (track.album || {}).images || [];
    const artUrl = images.length ? images[0].url : "";
    if (artUrl && artUrl !== state.artUrl) {
      state.artUrl = artUrl;
      const preload = new Image();
      preload.onload = () => { artworkEl.src = artUrl; };
      preload.src = artUrl;
    }

    // Track info
    if (newId !== state.trackId) {
      state.trackId = newId;
      state.trackName = track.name || "";
      state.artistName = (track.artists || []).map(a => a.name).join(", ");
      state.albumName = (track.album || {}).name || "";
      pillTrack.textContent = state.trackName;
      pillArtist.textContent = state.artistName;

      // Fetch lyrics for new track
      if (newId !== lyricsTrackId) {
        lyricsTrackId = newId;
        lyricsLines = [];
        lyricsWrap.classList.remove("visible");
        currentLyricIdx = -1;
        const durSec = Math.round((track.duration_ms || 0) / 1000);
        fetchLyrics(state.trackName, state.artistName, state.albumName, durSec)
          .then(lines => {
            if (lyricsTrackId === newId) {
              lyricsLines = lines;
              renderLyricLines();
            }
          });
      }
    }

    // Playback
    state.isPlaying = data.is_playing || false;
    state.progressMs = data.progress_ms || 0;
    state.durationMs = track.duration_ms || 1;
    state.lastUpdate = performance.now();

    // Pause tracking for QR overlay
    if (!state.isPlaying && !pausedSince) {
      pausedSince = performance.now();
    } else if (state.isPlaying) {
      pausedSince = 0;
    }

    // Spin
    setSpinTarget(state.isPlaying ? 1 : 0);

    // Show controls when track is loaded
    skipPrev.classList.toggle("visible", !!state.trackId);
    skipNext.classList.toggle("visible", !!state.trackId);
  }

  // ── QR Code generator — uses server-side qrcode API for reliability ──
  const QR = {
    // Fetch QR matrix from server (generated by python-qrcode, guaranteed correct)
    encode: async function(text) {
      try {
        const resp = await fetch("/api/qr?text=" + encodeURIComponent(text));
        if (!resp.ok) return null;
        return await resp.json(); // 2D array of booleans
      } catch(e) { return null; }
    }
  };

  // ── Vinyl-styled QR renderer ──
  // Standard dark-on-light QR (scannable) with semi-transparent white background
  // so artwork bleeds through, plus vinyl groove aesthetics in the margin.
  function drawVinylQR(matrix) {
    const canvas = qrOverlay;
    const ctx = canvas.getContext("2d");
    const W = 1080;
    const C = W / 2;
    const N = matrix.length;

    // Size QR so all corners + quiet zone fit inside the circle.
    const quietModules = 4;
    const totalModules = N + quietModules * 2;
    const inscribed = W / Math.SQRT2;
    const cell = Math.floor(inscribed / totalModules);
    const qrSize = cell * N;
    const off = Math.round((W - qrSize) / 2);

    ctx.clearRect(0, 0, W, W);
    ctx.save();

    // Circular clip
    ctx.beginPath();
    ctx.arc(C, C, C - 1, 0, Math.PI * 2);
    ctx.clip();

    // Semi-transparent WHITE background — artwork shows through
    // This serves as the QR "light" zone (standard QR = dark modules on light bg)
    ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
    ctx.fillRect(0, 0, W, W);

    // Subtle vinyl grooves in the outer margin only
    const halfQR = qrSize / 2 + cell * quietModules;
    for (let r = halfQR; r < C - 4; r += 3.5) {
      ctx.beginPath();
      ctx.arc(C, C, r, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(0,0,0,0.06)";
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Draw standard dark QR modules on the light background
    for (let row = 0; row < N; row++) {
      for (let col = 0; col < N; col++) {
        if (!matrix[row][col]) continue;

        const x = off + col * cell;
        const y = off + row * cell;

        ctx.fillStyle = "rgba(0, 0, 0, 0.92)";
        ctx.fillRect(x, y, cell, cell);
      }
    }

    // Outer rim accent
    ctx.beginPath();
    ctx.arc(C, C, C - 3, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(0,0,0,0.1)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  // ── Init QR overlay ──
  async function initQR() {
    try {
      const resp = await fetch("/api/info");
      if (!resp.ok) return;
      const data = await resp.json();
      const matrix = await QR.encode(data.url + "/login");
      if (matrix) {
        qrMatrix = matrix;
        drawVinylQR(qrMatrix);
      }
    } catch(e) { console.error("QR init error:", e); }
  }

  // ── Playback controls ──
  async function controlAction(action) {
    try {
      await fetch("/api/control/" + action, { method: "POST" });
      setTimeout(poll, 300);
    } catch(e) {}
  }

  skipPrev.addEventListener("click", () => controlAction("previous"));
  skipNext.addEventListener("click", () => controlAction("next"));
  pauseBtn.addEventListener("click", () => controlAction("play-pause"));

  // ── Swipe gestures (skip track) ──
  let touchStartX = 0;
  let touchStartTime = 0;
  const SWIPE_THRESHOLD = 80;
  const SWIPE_MAX_TIME = 500;

  document.getElementById("viewport").addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
    touchStartTime = performance.now();
  }, { passive: true });

  document.getElementById("viewport").addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dt = performance.now() - touchStartTime;
    if (dt < SWIPE_MAX_TIME && Math.abs(dx) > SWIPE_THRESHOLD) {
      controlAction(dx > 0 ? "previous" : "next");
    }
  }, { passive: true });

  // ── Prevent all image/element dragging ──
  document.addEventListener("dragstart", e => e.preventDefault());

  // ── Init ──
  drawGrooves();
  requestAnimationFrame(animate);
  poll();
  setInterval(poll, 2000);
  initQR();

})();
</script>
</body>
</html>
